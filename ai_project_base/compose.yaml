# 1. depends_on has a limitation. It waits for the container to start, not for PostgreSQL to be ready to accept connections. 
# PostgreSQL takes a second or two to initialize after the container starts. In production you'd add a healthcheck. 
# For now it's fine — just know why your app might occasionally fail on first boot.


services:
  fastapi_app:
    build: .
    ports:
      - "${FASTAPI_PORT}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_SQL_PORT}/${POSTGRES_DB}

    depends_on:
      - postgres_sql

  postgres_sql:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_SQL_PORT}:5432"
    